name = "sdf-lead-collector"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[routes]]
pattern = "form.salutediferro.com/send-lead"
zone_name = "salutediferro.com"

[[routes]]
pattern = "form.salutediferro.com/create-checkout-session"
zone_name = "salutediferro.com"

[[routes]]
pattern = "form.salutediferro.com/payment-success*"
zone_name = "salutediferro.com"

[[routes]]
pattern = "form.salutediferro.com/validate-referral"
zone_name = "salutediferro.com"

[[routes]]
pattern = "form.salutediferro.com/calendly-webhook"
zone_name = "salutediferro.com"

[[routes]]
pattern = "form.salutediferro.com/stripe-webhook"
zone_name = "salutediferro.com"

[[routes]]
pattern = "form.salutediferro.com/ask"
zone_name = "salutediferro.com"

# Founder Pass · counter posti rimasti (sprint 2 mag 2026, lancio lun 11 mag).
# Endpoint pubblico GET letto dal frontend ogni 60s + on visibilitychange/focus.
# Ritorna { slotsRemaining: number, slotsTotal: 200 }.
[[routes]]
pattern = "form.salutediferro.com/api/founder-slots-remaining"
zone_name = "salutediferro.com"

# D1 binding · database EU per founder_slots (e in futuro users + orders + test_results sprint Agente).
# Bound come `env.DB` nel Worker.
# Creato 6 mag 2026 da info@salutediferro.com, region EEUR (Europe East · privacy GDPR-friendly).
# Migration applicata: migrations/0001_create_founder_slots.sql (200 righe pre-seed).
[[d1_databases]]
binding = "DB"
database_name = "sdf-db"
database_id = "8a400239-f2d4-4a43-a5af-a692acbf1056"

[triggers]
crons = ["*/30 * * * *"]

[vars]
GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzotnzD1Uq5pSBQ4fRScmhVj6afxOpTUJvqdZwCkXuf_5T0nMNZLEQlBIYhqRf2Ew0PzA/exec"
# Bridge n8n self-hosted · workflow Stripe paid (ID e1bU7w1I0BvIzEm0) · fire-and-forget via ctx.waitUntil
# Vuoto / non settato = bridge disabled (Worker continua a funzionare normalmente)
N8N_STRIPE_WEBHOOK_URL = "https://n8n.salutediferro.com/webhook/stripe-paid"
# RESEND_API_KEY è ora in Cloudflare Secrets (wrangler secret put RESEND_API_KEY)
# STRIPE_SECRET_KEY è già in Cloudflare Secrets
# STRIPE_WEBHOOK_SECRET da aggiungere: wrangler secret put STRIPE_WEBHOOK_SECRET
#   → ottenere il valore dal Dashboard Stripe → Developers → Webhooks → endpoint
#     form.salutediferro.com/stripe-webhook → "Signing secret" (whsec_...)
