<html lang="it">

<style>
  :root {
    --bg:          #0D0D0D;
    --bg-card:     #1A1A1A;
    --bg-elevated: #242424;
    --accent:      #C82020;
    --accent-dark: #A01818;
    --accent-glow: rgba(200,32,32,0.15);
    --accent-glow2:rgba(200,32,32,0.08);
    --blue:        #1B4FBF;
    --text:        #F5F5F5;
    --text-sec:    #8A8A8A;
    --text-muted:  #555555;
    --border:      #2A2A2A;
    --border-active:#C82020;
    --input-bg:    #141414;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html {
    -webkit-text-size-adjust:100%;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Prevent pull-to-refresh on quiz */
    overscroll-behavior-y: contain;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(200,32,32,0.04) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(200,32,32,0.03) 0%, transparent 50%);
  }

  /* ───── PROGRESS ───── */
  .bar-track {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px; background: var(--border); z-index: 100;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #E83030 100%);
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* ───── COUNTER ───── */
  .counter {
    position: fixed; top: 14px; right: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px; letter-spacing: 2px; color: var(--text-muted);
    z-index: 100;
  }
  .counter b { color: var(--accent); font-weight: 400; }

  /* ───── LAYOUT ───── */
  .wrap {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 44px 16px 32px;
    flex-wrap: nowrap;
  }

  /* ───── CARD / ANIMATION ───── */
  .card {
    width: 100%; max-width: 560px;
    animation: fadeUp .32s cubic-bezier(.25,.46,.45,.94) forwards;
    opacity: 0;
    text-align: center;
    will-change: transform, opacity;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translate3d(0, 18px, 0); }
    to   { opacity: 1; transform: translate3d(0, 0, 0); }
  }
  .card.out {
    animation: fadeDown .18s cubic-bezier(.55,.085,.68,.53) forwards;
  }
  @keyframes fadeDown {
    from { opacity: 1; transform: translate3d(0, 0, 0); }
    to   { opacity: 0; transform: translate3d(0, -12px, 0); }
  }

  /* ───── LOGO ───── */
  .logo-wrap { text-align: center; margin-bottom: 28px; }
  .logo-img {
    max-width: 160px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  /* ───── STEP LABEL ───── */
  .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px; letter-spacing: 4px; color: var(--accent);
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .label::before,
  .label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ───── QUESTION ───── */
  .question {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(24px, 5vw, 36px);
    line-height: 1.1; letter-spacing: 1px;
    color: var(--text); margin-bottom: 8px;
  }
  .hint {
    font-size: 13px; color: var(--text-sec);
    font-weight: 300; line-height: 1.5; margin-bottom: 20px;
  }

  /* ───── OPTIONS ───── */
  .options { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; text-align: left; width: 100%; }

  .opt {
    display: flex; align-items: center; gap: 13px;
    padding: 12px 14px;
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 6px; width: 100%;
    text-align: left; cursor: pointer;
    position: relative; overflow: hidden;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: border-color .15s, background .15s, transform .1s;
    touch-action: manipulation;
  }
  .opt:active {
    transform: scale(0.98);
    transition-duration: .05s;
  }

  .opt::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform .15s;
  }
  .opt.sel::before { transform: scaleY(1); }

  @media (hover: hover) and (pointer: fine) {
    .opt:hover {
      border-color: var(--accent);
      background: var(--bg-elevated);
    }
    .opt:hover .key { color: var(--accent); }
  }

  .opt.sel {
    border-color: var(--accent);
    background: var(--bg-elevated);
    box-shadow: 0 0 12px var(--accent-glow2);
  }

  .txt { font-size: 15px; color: var(--text); line-height: 1.4; flex: 1; }

  /* Radio / checkbox indicator */
  .indicator {
    margin-left: auto; width: 18px; height: 18px;
    border: 1.5px solid var(--border); border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .opt.sel .indicator { background: var(--accent); border-color: var(--accent); }
  .indicator::after {
    content: ''; width: 6px; height: 6px;
    background: white; border-radius: 50%;
    opacity: 0; transition: opacity .15s;
  }
  .opt.sel .indicator::after { opacity: 1; }

  /* Checkbox variant (multi) */
  .opt.multi .indicator { border-radius: 3px; }
  .opt.multi.sel .indicator::after {
    width: 9px; height: 5px;
    background: transparent; border-radius: 0;
    border-left: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }

  /* ───── INPUTS ───── */
  .field { margin-bottom: 16px; text-align: left; }
  .field-label {
    display: block; margin-bottom: 7px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px; letter-spacing: 3px; color: var(--text-muted);
    text-align: center;
  }
  .field-error {
    font-size: 12px; color: var(--accent); margin-top: 4px;
    display: none;
  }
  .field-input.invalid { border-color: var(--accent); }
  .btn-loading { pointer-events: none; opacity: 0.7; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .field-input {
    width: 100%; padding: 13px 14px;
    background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field-input::placeholder { color: var(--text-muted); }

  /* ───── PRIVACY ───── */
  .sep { height: 1px; background: var(--border); margin: 20px 0; }

  .privacy {
    display: flex; align-items: flex-start; gap: 11px;
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 6px; padding: 14px; margin-bottom: 22px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .privacy:hover { border-color: var(--accent); }
  .privacy.on { border-color: var(--accent); background: var(--bg-elevated); }

  .pbox {
    width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid var(--border); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .privacy.on .pbox { background: var(--accent); border-color: var(--accent); }
  .pbox::after {
    content: ''; display: none;
    width: 9px; height: 5px;
    border-left: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }
  .privacy.on .pbox::after { display: block; }
  .ptxt { font-size: 13px; color: var(--text-sec); line-height: 1.5; }
  .ptxt a { color: var(--accent); text-decoration: none; }

  /* ───── BUTTONS ───── */
  .btn-primary {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 18px 32px;
    background: linear-gradient(135deg, var(--accent) 0%, #D42B2B 100%);
    border: none; border-radius: 6px; color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px;
    cursor: pointer; position: relative; overflow: hidden;
    box-shadow: 0 3px 14px var(--accent-glow);
    transition: transform .18s, box-shadow .18s, background .18s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 55%);
  }
  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
    transform: translateY(-1px);
    box-shadow: 0 7px 20px var(--accent-glow);
  }
  .btn-primary:active:not(:disabled) { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: .35; cursor: not-allowed;
    transform: none !important; box-shadow: none;
  }

  .btn-back {
    background: none; border: none;
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer;
    padding: 10px 0; margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    transition: color .15s;
  }
  .btn-back:hover { color: var(--accent); }

  /* ───── INTRO PAGE ───── */
  .h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    line-height: 1.12; letter-spacing: 1px;
    color: var(--text); margin-bottom: 12px;
    text-align: center;
  }
  .h1 em { color: var(--accent); font-style: normal; }

  .intro-p {
    font-size: 14px; color: var(--text-sec);
    line-height: 1.6; margin-bottom: 24px;
    font-weight: 300; max-width: 480px;
    text-align: center; margin-left: auto; margin-right: auto;
  }

  .stats {
    display: flex; margin-bottom: 20px;
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .stat {
    flex: 1; padding: 12px 10px; text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-n {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--accent); line-height: 1;
  }
  .stat-l {
    font-size: 10px; color: var(--text-muted);
    margin-top: 3px; line-height: 1.2;
  }

  .time-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }

  /* ───── THANK YOU ───── */
  .ty-icon {
    width: 68px; height: 68px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, #D42B2B 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 24px var(--accent-glow);
  }
  .ty-icon svg { width: 28px; height: 28px; }

  .ty-h {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 5.5vw, 48px);
    letter-spacing: 2px; line-height: 1.08;
    color: var(--text); text-align: center; margin-bottom: 12px;
  }
  .ty-h em { color: var(--accent); font-style: normal; }

  .ty-p {
    font-size: 15px; color: var(--text-sec);
    line-height: 1.75; text-align: center;
    margin-bottom: 28px; font-weight: 300;
  }

  .ty-box {
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 6px; padding: 20px 22px;
  }
  .ty-box-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px; letter-spacing: 3px; color: var(--accent);
    margin-bottom: 14px;
  }
  .ty-row { display: flex; gap: 13px; align-items: flex-start; margin-bottom: 11px; }
  .ty-row:last-child { margin-bottom: 0; }
  .ty-n {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; color: var(--accent); min-width: 22px; line-height: 1.4;
  }
  .ty-t { font-size: 14px; color: var(--text-sec); line-height: 1.5; }
  .ty-t strong { color: var(--text); }

  /* ───── TOAST ───── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--accent); color: white;
    padding: 11px 22px; border-radius: 6px;
    font-size: 13px; letter-spacing: .3px;
    box-shadow: 0 6px 20px rgba(0,0,0,.3);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    z-index: 200; white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ───── ESITO PAGE ───── */
  .esito-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 5px; color: var(--accent);
    margin-bottom: 12px; text-align: center;
    opacity: 0; animation: fadeUp .6s ease .2s forwards;
  }
  .esito-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    line-height: 1.1; letter-spacing: 1px;
    color: var(--text); text-align: center; margin-bottom: 8px;
    opacity: 0; animation: fadeUp .6s ease .4s forwards;
  }
  .esito-heading em { color: var(--accent); font-style: normal; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .esito-hint {
    font-size: 14px; color: var(--text-sec); line-height: 1.6;
    text-align: center; margin-bottom: 24px; font-weight: 300;
  }
  .esito-hint strong { color: var(--text); }

  .tags-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-bottom: 28px;
  }
  .tag-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: rgba(200,32,32,0.08);
    border: 1.5px solid var(--accent);
    border-radius: 24px;
    animation: tagPop .5s cubic-bezier(.34,1.56,.64,1) forwards; opacity: 0;
    box-shadow: 0 0 16px rgba(200,32,32,0.15);
    transition: transform .2s, box-shadow .2s;
  }
  .tag-badge:hover {
    transform: scale(1.05);
    box-shadow: 0 0 24px rgba(200,32,32,0.3);
  }
  @keyframes tagPop {
    0%   { opacity: 0; transform: scale(.5) translateY(10px); }
    60%  { opacity: 1; transform: scale(1.08) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .tag-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px var(--accent); }
    50%      { box-shadow: 0 0 14px var(--accent), 0 0 24px rgba(200,32,32,0.3); }
  }
  .tag-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 2px;
    color: var(--accent);
  }

  .tag-details {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 6px;
    padding: 16px 20px; margin-bottom: 20px;
  }
  .tag-detail-row {
    display: flex; gap: 12px; align-items: baseline;
    margin-bottom: 8px;
  }
  .tag-detail-row:last-child { margin-bottom: 0; }
  .tag-detail-key {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 2px;
    color: var(--accent); min-width: 100px; flex-shrink: 0;
  }
  .tag-detail-desc {
    font-size: 13px; color: var(--text-sec); line-height: 1.4;
  }

  .esito-urgency {
    background: var(--bg-card);
    border: 1.5px solid var(--accent);
    border-radius: 6px; padding: 16px 20px;
    text-align: center; margin-bottom: 24px;
  }
  .esito-urgency p {
    font-size: 14px; color: var(--text); line-height: 1.5;
  }

  /* ───── SCORE GAUGE ───── */
  .score-gauge {
    margin: 24px auto 28px;
    text-align: center;
    opacity: 0; animation: fadeUp .6s ease .6s forwards;
  }
  .score-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(200,32,32,0.4);
    animation: countPulse .8s ease .8s;
  }
  @keyframes countPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); text-shadow: 0 0 40px rgba(200,32,32,0.6); }
    100% { transform: scale(1); }
  }
  .score-max {
    font-size: 28px; color: var(--text-muted);
  }
  .score-dots {
    display: flex; justify-content: center; gap: 10px;
    margin-top: 16px;
  }
  .score-dot {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    border: 2px solid var(--border);
    color: var(--text-muted);
    opacity: 0;
    animation: dotIn .4s ease forwards;
  }
  .score-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 12px rgba(200,32,32,0.4);
  }
  @keyframes dotIn {
    from { opacity: 0; transform: scale(.3); }
    to   { opacity: 1; transform: scale(1); }
  }
  .esito-desc {
    font-size: 15px; color: var(--text-sec); line-height: 1.6;
    text-align: center; margin-bottom: 16px; padding: 0 8px;
  }
  .esito-msg {
    font-size: 14px; color: var(--text); line-height: 1.5;
    text-align: center; margin-bottom: 24px; font-weight: 500;
    padding: 16px 20px;
    background: var(--bg-card);
    border-radius: 6px;
    border-left: 4px solid var(--accent);
  }

  /* ───── ESITO REDESIGN ───── */
  .esito-hero {
    text-align: center; padding-bottom: 32px;
    border-bottom: 1px solid var(--border); margin-bottom: 32px;
  }
  .esito-tag {
    display: inline-block; padding: 6px 16px;
    font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 4px;
    color: var(--gold, #D4A24C); background: rgba(212,162,76,0.1);
    border: 1px solid rgba(212,162,76,0.25); border-radius: 4px;
    margin-bottom: 16px;
  }
  .esito-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(26px, 5vw, 40px); line-height: 1.1;
    letter-spacing: 2px; color: var(--text); margin-bottom: 12px;
  }
  .esito-subtitle {
    font-size: 14px; color: var(--text-sec); line-height: 1.6;
    max-width: 480px; margin: 0 auto;
  }

  /* Core Foundation */
  .section-label {
    font-family: 'Bebas Neue', sans-serif; font-size: 10px;
    letter-spacing: 4px; color: var(--accent); margin-bottom: 14px;
  }
  .core-card {
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 32px;
    position: relative;
  }
  .core-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--accent); border-radius: 10px 0 0 10px;
  }
  .core-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .core-icon { font-size: 20px; }
  .core-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;

function computeScore() {
  var total = 0;
  var keys = Object.keys(SCORE_RULES);
  keys.forEach(function(key) {
    var answer = S.a[key];
    if (!answer || !SCORE_RULES[key]) return;
    var pts = SCORE_RULES[key][answer];
    if (typeof pts === 'number') total += pts;
  });
  return Math.max(0, total);
}

function getScoreLevel(score) {
  for (var i = 0; i < SCORE_LEVELS.length; i++) {
    if (score >= SCORE_LEVELS[i].min && score <= SCORE_LEVELS[i].max) return SCORE_LEVELS[i];
  }
  return SCORE_LEVELS[0];
}

function computeTags() {
  var tagSet = {};
  var allKeys = Object.keys(HASHTAG_RULES);
  allKeys.forEach(function(key) {
    var answer = S.a[key];
    if (!answer || !HASHTAG_RULES[key]) return;
    if (Array.isArray(answer)) {
      answer.forEach(function(a) { (HASHTAG_RULES[key][a] || []).forEach(function(tag) { tagSet[tag] = (tagSet[tag]||0) + 1; }); });
    } else {
      (HASHTAG_RULES[key][answer] || []).forEach(function(tag) { tagSet[tag] = (tagSet[tag]||0) + 1; });
    }
  });
  var sorted = Object.keys(tagSet).sort(function(a,b) { return tagSet[b] - tagSet[a]; });
  return sorted.slice(0, 3);
}

function getSexLetter() {
  var sex = S.a.sex;
  if (!sex) return null;
  return sex === 'M' ? 'M' : 'F';
}
function getSegment() {
  var base = getSexLetter();
  if (!base) return null;
  var age = S.a.age;
  if (!age) return base;
  var over40 = (age === '40-49' || age === '50+');
  return base + (over40 ? '_O40' : '_U40');
}

function getSteps() {
  var sex = getSexLetter();
  var branch = sex && BRANCHES[sex] ? BRANCHES[sex] : BRANCHES['M'];
  return COMMON_START.concat(branch).concat(COMMON_AFTER).concat(COMMON_END);
}

async function sendLead() {
  var c = S.a.contacts || {};
  var score = computeScore();
  var lvl = getScoreLevel(score);
  // Resolve option keys to human-readable text
  function resolveKey(stepKey, val) {
    if (!val) return '';
    var steps = getSteps();
    for (var i = 0; i < steps.length; i++) {
      if (steps[i].k === stepKey && steps[i].opts) {
        var opt = steps[i].opts.find(function(o) { return o.k === val; });
        if (opt) return opt.v;
      }
    }
    return val;
  }
  function resolveMulti(stepKey, vals) {
    if (!Array.isArray(vals) || vals.length === 0) return [];
    return vals.map(function(v) { return resolveKey(stepKey, v); });
  }
  var payload = {
    name: c.name || '', phone: c.phone || '', email: c.email || '', referral: S.a.referral || '',
    segment: getSegment() || '',
    sex: resolveKey('sex', S.a.sex), age: resolveKey('age', S.a.age),
    training: resolveKey('training', S.a.training),
    pharma: resolveKey('pharma', S.a.pharma), energia: resolveKey('energia', S.a.energia),
    sonno: resolveKey('sonno', S.a.sonno),
    libido: resolveKey('libido', S.a.libido),
    ciclo: resolveKey('ciclo', S.a.ciclo),
    grasso: resolveKey('grasso', S.a.grasso),
    pressione: resolveKey('pressione', S.a.pressione),
    assunzione: resolveMulti('assunzione', S.a.assunzione),
    analisi: resolveKey('analisi', S.a.analisi),
    tags: computeTags(), score: score, score_level: lvl.level, score_name: lvl.name,
    suggested_panels: recommendPanels().join(', '),
    panel_scores: (function() { var s = computePanelScores(); var r = {}; for (var i = 0; i < PANEL_KEYS.length; i++) r[PANEL_KEYS[i]] = s[i]; return r; })()
  };
  try { var res = await fetch('/send-lead', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }); if(res.ok){track('quiz_submit_success',{});}else{track('quiz_submit_error',{error_type:'http_'+res.status});} } catch(e){ console.error(e); track('quiz_submit_error',{error_type:e.message||'network'}); }
  try { var prev = JSON.parse(localStorage.getItem('sdf_leads')||'[]'); prev.push(Object.assign({}, payload, {id:Date.now(), ts:new Date().toISOString()})); localStorage.setItem('sdf_leads', JSON.stringify(prev)); } catch(e){}
}

function render() {
  var steps = getSteps();
  var step = steps[S.step];
  var contentSteps = steps.length - 2; // exclude intro and thanks

  var el = { bar: document.getElementById('bar'), counter: document.getElementById('counter'), cs: document.getElementById('cs') };
  if (S.step === 0 || step.t === 'esito' || step.t === 'payment') {
    el.bar.style.width = step.t === 'payment' ? '100%' : step.t === 'esito' ? '97%' : '0%';
    el.counter.style.display = 'none';
  } else if (step.t === 'contacts') {
    el.bar.style.width = '95%';
    el.counter.style.display = 'none';
  } else {
    var stepNum = step.label ? step.label.replace('STEP ', '') : S.step;
    el.bar.style.width = (parseInt(stepNum) / LAST_CONTENT * 100) + '%';
    el.counter.style.display = 'block';
    el.cs.textContent = stepNum;
  }

  if (step.t === 'intro') {
    track('quiz_intro_view', UTM);
  } else if (step.t === 'payment') {
    track('payment_view', {});
  } else {
    track('quiz_step_view', { step_number: S.step, step_name: step.k || step.t });
  }
  S.stepStartTime = Date.now();

  var html = '';
  if (step.t === 'intro')    html = buildIntro();
  if (step.t === 'single')   html = buildOptions(step);
  if (step.t === 'multi')    html = buildOptions(step);
  if (step.t === 'esito')    html = buildEsito();
  if (step.t === 'contacts') html = buildContacts(step);
  if (step.t === 'payment')  html = buildPayment();

  var root = document.getElementById('root');
  var old  = root.querySelector('.card');
  function inject() { root.innerHTML = '<div class="card">' + html + '</div>'; }
  if (old) { old.classList.add('out'); setTimeout(inject, 210); } else { inject(); }
}

var shuffledOpts = {};
function getShuffledOpts(step) {
  if (!shuffledOpts[step.k]) {
    var arr = step.opts.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    shuffledOpts[step.k] = arr;
  }
  return shuffledOpts[step.k];
}

function buildOptions(step) {
  var isMulti = step.t === 'multi';
  var sel = S.a[step.k] || (isMulti ? [] : '');
  var hasAny = isMulti ? sel.length > 0 : !!sel;
  var opts = '';
  var shuffled = getShuffledOpts(step);
  shuffled.forEach(function(o) {
    var active = isMulti ? sel.includes(o.k) : sel === o.k;
    opts += '<button type="button" class="opt' + (isMulti ? ' multi' : '') + (active ? ' sel' : '') + '" data-key="' + o.k + '" onclick="pick(\'' + step.k + '\',\'' + o.k + '\',' + isMulti + ')">' +
      '<span class="txt">' + o.v + '</span><span class="indicator"></span></button>';
  });
  return '<div class="label">' + step.label + '</div>' +
    '<div class="question">' + step.q.replace('\n', '<br>') + '</div>' +
    '<div class="options">' + opts + '</div>' +

var PANEL_KEYS = ['androgeno','cuore','reni','fegato','metabolico','tiroide','recovery','donna'];

function computePanelScores() {
  var scores = [0,0,0,0,0,0,0,0]; // same order as PANEL_KEYS
  var sex = getSexLetter();
  Object.keys(PANEL_SCORE_MATRIX).forEach(function(key) {
    var answer = S.a[key];
    if (!answer) return;
    var rule = PANEL_SCORE_MATRIX[key];
    if (Array.isArray(answer)) {
      // Multi-select: sum scores for each selected option
      answer.forEach(function(a) {
        var pts = rule[a];
        if (!pts) return;
        for (var i = 0; i < 8; i++) {
          var v = pts[i];
          if (typeof v === 'number') scores[i] += v;
          // Handle conditional "+3 se donna"
          else if (typeof v === 'string' && v === 'D3' && sex === 'F') scores[7] += 3;
        }
      });
    } else {
      var pts = rule[answer];
      if (!pts) return;
      for (var i = 0; i < 8; i++) {
        var v = pts[i];
        if (typeof v === 'number') scores[i] += v;
        else if (typeof v === 'string' && v === 'D3' && sex === 'F') scores[7] += 3;
      }
    }
  });
  return scores;
}

function recommendPanels() {
  var scores = computePanelScores();
  var sex = getSexLetter();
  var result = [];
  for (var i = 0; i < PANEL_KEYS.length; i++) {
    var pk = PANEL_KEYS[i];
    var p = PANELS[pk];
    // Filter by gender
    if (p.gender === 'M' && sex === 'F') continue;
    if (p.gender === 'F' && sex === 'M') continue;
    if (scores[i] >= 2) result.push({ key: pk, score: scores[i] });
  }
  // Sort by score descending, pick top 3
  result.sort(function(a,b) { return b.score - a.score; });
  return result.slice(0, 3).map(function(r) { return r.key; });
}

// Keep computeAllTags for hashtag display
function computeAllTags() {
  var tagSet = {};
  var allKeys = Object.keys(HASHTAG_RULES);
  allKeys.forEach(function(key) {
    var answer = S.a[key];
    if (!answer || !HASHTAG_RULES[key]) return;
    if (Array.isArray(answer)) {
      answer.forEach(function(a) { (HASHTAG_RULES[key][a] || []).forEach(function(tag) { tagSet[tag] = (tagSet[tag]||0) + 1; }); });
    } else {
      (HASHTAG_RULES[key][answer] || []).forEach(function(tag) { tagSet[tag] = (tagSet[tag]||0) + 1; });
    }
  });
  return tagSet;
}

// Referral validation is server-side only — no codes exposed in client
function isValidReferral(code) {
  // Returns cached server response; defaults to false until validated
  return !!code && S._referralValid === code.toUpperCase();

async function validateReferralServer(code) {
  if (!code) { S._referralValid = ''; S._referralDiscount = 0; return false; }
  try {
    var res = await fetch('https://form.salutediferro.com/validate-referral', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });
    var json = await res.json();
    if (json.valid) { S._referralValid = code.toUpperCase(); S._referralDiscount = json.discount || 10; return true; }
    S._referralValid = ''; S._referralDiscount = 0;
    return false;
  } catch (e) { S._referralValid = ''; S._referralDiscount = 0; return false; }
}
function getReferralPrice() {
  var d = S._referralDiscount || 0;
  if (!d) return null;
  var price = 47 * (1 - d / 100);
  return price % 1 === 0 ? price.toFixed(0) : price.toFixed(2).replace('.', ',');
}

function pick(key, val, isMulti) {
  var steps = getSteps();
  var step = steps[S.step];
  if (isMulti) {
    var cur = Array.isArray(S.a[key]) ? S.a[key] : [];
    // Exclusive options: find if this step has opts with an 'exclusive' flag or if key is 'valori'
    var exclusiveKeys = [];
    if (step.opts) {
      step.opts.forEach(function(o) { if (o.exclusive) exclusiveKeys.push(o.k); });
    }
    var isExclusive = exclusiveKeys.includes(val);
    if (isExclusive) {
      // Clicking an exclusive option: toggle it alone, deselect everything else
      S.a[key] = cur.includes(val) ? [] : [val];
    } else {
      // Clicking a normal option: remove any exclusive options first
      cur = cur.filter(function(v) { return !exclusiveKeys.includes(v); });
      S.a[key] = cur.includes(val) ? cur.filter(function(v){return v!==val;}) : cur.concat([val]);
    }
  } else {
    S.a[key] = val;
  }
  var optObj = step.opts.find(function(o){return o.k===val;});
  saveState();
  track('quiz_option_select', { step_number: S.step, step_name: key, option_key: val, option_value: optObj?optObj.v:val });
  refreshOptions(key, isMulti);
}

function refreshOptions(key, isMulti) {
  var sel = S.a[key] || (isMulti ? [] : '');
  document.querySelectorAll('.opt').forEach(function(btn) {
    var k = btn.getAttribute('data-key');
    btn.classList.toggle('sel', isMulti ? sel.includes(k) : sel === k);
  });
  var cta = document.getElementById('cta');
  if (cta) cta.disabled = isMulti ? sel.length === 0 : !sel;
}

function goNext() {
  var steps = getSteps();
  var step = steps[S.step];
  if (S.stepStartTime) {
    track('quiz_step_time', { step_name: step.k||step.t, step_number: S.step, time_seconds: Math.round((Date.now()-S.stepStartTime)/1000) });
  }
  track('quiz_step_complete', { step_number: S.step, step_name: step.k||step.t, answer: S.a[step.k]||'' });
  if (step.k === 'sex') track('quiz_segment_assigned', { segment: getSegment() });
  go(S.step + 1);
}

function goBack() {
  track('quiz_step_back', { from_step: S.step, to_step: S.step-1 });
  go(S.step - 1);
}

function go(n, fromPop) {
  var steps = getSteps();
  if (n < 0 || n >= steps.length) return;
  S.step = n;
  saveState();
  if (!fromPop) history.pushState({ step: n }, '', '');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
window.addEventListener('popstate', function(e) {
  if (e.state && typeof e.state.step === 'number') {
    go(e.state.step, true);
  } else {
    go(0, true);
  }
});

function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function isValidPhone(v) { return /^[\d\s\+\-\(\)]{7,}$/.test(v); }
function setContact(field, val) {
  if (!S.a.contacts) S.a.contacts = {};
  S.a.contacts[field] = val.trim();
  var errEl = document.getElementById('err-' + field);
  if (field === 'email' && val.trim() && !isValidEmail(val.trim())) {
    if (errEl) { errEl.textContent = 'Inserisci un\'email valida'; errEl.style.display = 'block'; }
  } else if (field === 'phone' && val.trim() && !isValidPhone(val.trim())) {
    if (errEl) { errEl.textContent = 'Inserisci un numero di telefono valido'; errEl.style.display = 'block'; }
  } else {
    if (errEl) { errEl.style.display = 'none'; }
  }
  saveState();
  checkCta();
}
function togglePrivacy() {
  S.privacy = !S.privacy;
  saveState();
  var w = document.getElementById('privacy-wrap');
  if (w) w.classList.toggle('on', S.privacy);
  checkCta();
}
function checkCta() {
  var c = S.a.contacts || {};
  var btn = document.getElementById('cta');
  var valid = c.name && c.phone && c.email && S.privacy && isValidEmail(c.email) && isValidPhone(c.phone);
  if (btn) btn.disabled = !valid;
}

/* ════════════════════════════════════════
   TOAST + KEYBOARD + ABANDON + BOOT
════════════════════════════════════════ */
function toast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3600); }

document.addEventListener('keydown', function(e) {
  var steps=getSteps(); var step=steps[S.step]; if(!step) return;
  if (e.key==='Enter' && (step.t==='multi'||step.t==='single'||step.t==='contacts')) { var btn=document.getElementById('cta'); if(btn&&!btn.disabled) btn.click(); }
});

window.addEventListener('beforeunload', function() {
  var steps=getSteps();
  if (S.step>0 && S.step<steps.length-1) {
    var elapsed=S.startTime?Math.round((Date.now()-S.startTime)/1000):0;
    track('quiz_abandon', { last_step:S.step, time_on_page:elapsed });
  }
});

// Ricostruisci la history stack per il browser back
if (S.step > 0) {
  history.replaceState({ step: 0 }, '', '');
  for (var _i = 1; _i <= S.step; _i++) {
    history.pushState({ step: _i }, '', '');
  }
} else {
  history.replaceState({ step: 0 }, '', '');
}
render();
</script>
